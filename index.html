<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Kyle's Links</title>

  <meta name="description" content="Kyle Vincent's links — wrapped around a playable 3D Space Cadet Pinball machine sitting on a Windows XP desktop.">
  <meta name="author" content="Kyle Vincent">
  <meta name="theme-color" content="#0a3f85">

  <!-- Open Graph / social cards -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Kyle's Links">
  <meta property="og:description" content="A playable pinball table on a Windows XP desktop. Click the machine to play.">
  <meta property="og:url" content="https://kylevincent.org">
  <meta property="og:image" content="https://upload.wikimedia.org/wikipedia/en/2/27/Bliss_%28Windows_XP%29.png">
  <meta name="twitter:card" content="summary_large_image">

  <!-- Inline SVG favicon: pinball silver ball on a space-purple square -->
  <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='12' fill='%23220a40'/><circle cx='32' cy='32' r='18' fill='url(%23g)'/><defs><radialGradient id='g' cx='40%25' cy='35%25'><stop offset='0%25' stop-color='%23fff'/><stop offset='70%25' stop-color='%23bbb'/><stop offset='100%25' stop-color='%23333'/></radialGradient></defs></svg>">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a3f85;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      height: 100dvh;
      width: 100vw;
    }

    /* ── Game canvas wrapper ───────────────────────────────────────────────── */
    #game-wrapper {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      z-index: 1;
      pointer-events: none; /* transparent area doesn't swallow clicks — falls through to bliss-bg */
    }
    #canvas-clip {
      pointer-events: auto; /* canvas still receives all touch/click events */
      overflow: hidden;
      flex-shrink: 0;
      position: relative;
    }

    /* Portrait mobile: machine sits at bottom, Bliss wallpaper fills space above. */
    @media (max-width: 768px) and (orientation: portrait) {
      #game-wrapper {
        align-items: flex-end;
        justify-content: flex-start;
        overflow: hidden;
      }
    }

    canvas#canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      display: block;
    }

    /* ── Links overlay ─────────────────────────────────────────────────────── */
    #overlay {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 20px 40px;
      pointer-events: none;
      transform: translateY(0);
      transition: transform 1.1s cubic-bezier(0.22, 1, 0.36, 1),
                  opacity 0.7s ease,
                  visibility 0s linear 0s;
    }
    #overlay.hidden {
      transform: translateY(-110vh);
      opacity: 0;
      visibility: hidden;
      transition: transform 1.1s cubic-bezier(0.22, 1, 0.36, 1),
                  opacity 0.6s ease,
                  visibility 0s linear 1.1s;
    }

    /* ── Desktop icons — tiny WinXP-style shortcuts over Bliss ─────────────── */
    #desktop-icons {
      position: fixed;
      top: 60%;
      left: 0;
      right: 0;
      padding: 0 16px 10px;
      z-index: 15;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.35s ease;
    }
    #desktop-icons.show { opacity: 1; }

    .bliss-title {
      font-size: clamp(1.3rem, 6vw, 2.4rem);
      font-weight: 900;
      color: #fff;
      letter-spacing: 0.02em;
      text-align: center;
      pointer-events: none;
      text-shadow:
        0 0 8px  rgba(255, 120,  30, 1.0),
        0 0 24px rgba(255,  80,   0, 0.7),
        0 0 60px rgba(255,  40,   0, 0.35),
        2px 2px 4px rgba(0,0,0,0.6);
    }

    .desk-icons-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      pointer-events: none;
      max-width: 560px;
    }

    .desk-icon {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 76px;
      gap: 4px;
      padding: 6px 4px 7px;
      border-radius: 3px;
      cursor: pointer;
      pointer-events: auto;
      text-decoration: none;
      color: #fff;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.12s ease, transform 0.12s ease;
    }
    .desk-icon:hover,
    .desk-icon:active { background: rgba(49, 106, 197, 0.55); transform: translateY(-1px); }
    .desk-icon:focus-visible { outline: 2px dotted #fff; outline-offset: 2px; }

    .desk-icon-img {
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      filter: drop-shadow(0 1px 3px rgba(0,0,0,0.7));
    }
    .desk-icon span {
      font-size: 0.78rem;
      font-weight: 500;
      text-align: center;
      line-height: 1.25;
      text-shadow: 1px 1px 0 rgba(0,0,0,1),
                   -1px -1px 0 rgba(0,0,0,1),
                   1px -1px 0 rgba(0,0,0,1),
                   -1px  1px 0 rgba(0,0,0,1),
                   0 0 6px rgba(0,0,0,0.8);
    }

    /* dark scrim behind buttons for readability */
    #overlay::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(
        ellipse 70% 65% at 50% 48%,
        rgba(0,0,0,0.62) 0%,
        transparent 100%
      );
      pointer-events: none;
    }

    .site-title {
      position: relative;
      font-size: clamp(2rem, 9vw, 4.5rem);
      font-weight: 900;
      color: #fff;
      text-align: center;
      letter-spacing: 0.02em;
      margin-bottom: 28px;
      text-shadow:
        0 0 8px  rgba(255, 120,  30, 1.0),
        0 0 24px rgba(255,  80,   0, 0.7),
        0 0 60px rgba(255,  40,   0, 0.35),
        0 0 100px rgba(255, 160, 60, 0.15);
    }

    .links {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 11px;
      width: min(310px, 86vw);
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 13px 20px;
      background: rgba(255,255,255,0.09);
      backdrop-filter: blur(20px) saturate(1.5);
      -webkit-backdrop-filter: blur(20px) saturate(1.5);
      border: 1.5px solid rgba(255,255,255,0.18);
      border-radius: 100px;
      color: #fff;
      font-size: 0.93rem;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      pointer-events: auto;
      transition: background 0.2s, border-color 0.2s, transform 0.15s, box-shadow 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .link-btn svg { flex-shrink: 0; opacity: 0.85; }
    .link-btn:hover {
      background: rgba(255,255,255,0.18);
      border-color: rgba(255,160,60,0.5);
      box-shadow: 0 0 20px rgba(255,100,0,0.2);
      transform: translateY(-1px);
    }
    .link-btn:active { transform: scale(0.97); }
    .link-btn:focus-visible {
      outline: 2px solid rgba(255,180,80,0.9);
      outline-offset: 2px;
    }

    /* Play hint — subtle tip on the overlay */
    .play-hint {
      position: relative;
      margin-top: 22px;
      font-size: 0.76rem;
      font-weight: 500;
      color: rgba(255,255,255,0.55);
      display: flex;
      align-items: center;
      gap: 7px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      pointer-events: none;
      text-shadow: 0 1px 6px rgba(0,0,0,0.8);
      animation: nudge 2.6s ease-in-out infinite;
    }
    .play-hint .spark {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #ffaa40;
      box-shadow: 0 0 8px #ff7a00;
    }
    @keyframes nudge {
      0%, 100% { opacity: 0.55; }
      50%       { opacity: 0.9; }
    }

    /* ── Paddle tap zones (game mode) ─────────────────────────────────────── */
    .paddle {
      position: fixed;
      bottom: 0;
      height: 42%;
      width: 40%;
      z-index: 30;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.45s ease;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
      display: flex;
      align-items: flex-end;
      padding-bottom: 18px;
    }
    .paddle.active {
      opacity: 1;
      pointer-events: auto;
    }
    .paddle.lit { filter: brightness(1.6); }

    #paddle-L {
      left: 0;
      background: radial-gradient(ellipse 100% 80% at 0% 100%, rgba(60,180,255,0.18) 0%, transparent 70%);
      border-top-right-radius: 60%;
      justify-content: flex-start;
      padding-left: 14px;
    }
    #paddle-R {
      right: 0;
      background: radial-gradient(ellipse 100% 80% at 100% 100%, rgba(60,180,255,0.18) 0%, transparent 70%);
      border-top-left-radius: 60%;
      justify-content: flex-end;
      padding-right: 14px;
    }
    .paddle-label {
      font-size: 0.6rem;
      font-weight: 700;
      color: rgba(255,255,255,0.45);
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    /* ── Control buttons (centered in desktop-icons, game mode) ────────────── */
    #game-controls {
      display: flex;
      gap: 8px;
      justify-content: center;
    }
    .ctrl-btn {
      pointer-events: auto;
      background: rgba(8, 4, 20, 0.82);
      border: 1px solid rgba(255,255,255,0.16);
      color: rgba(255,255,255,0.75);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 8px 14px;
      border-radius: 100px;
      cursor: pointer;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
      font-family: inherit;
    }
    .ctrl-btn:hover {
      color: #fff;
      border-color: rgba(255,255,255,0.32);
      background: rgba(20, 10, 40, 0.9);
    }
    .ctrl-btn:focus-visible {
      outline: 2px solid rgba(255,180,80,0.9);
      outline-offset: 2px;
    }

    /* ── Bliss wallpaper ───────────────────────────────────────────────────── */
    #bliss-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: #0a3f85 url('https://upload.wikimedia.org/wikipedia/en/2/27/Bliss_%28Windows_XP%29.png') center/cover no-repeat;
      z-index: 0;
      height: 100%;
    }

    /* ── Loading screen ─────────────────────────────────────────────────────── */
    #loader {
      position: fixed;
      inset: 0;
      background: #04000e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.8s ease;
    }
    #loader.fade { opacity: 0; pointer-events: none; }

    .load-title {
      font-size: clamp(1.6rem, 6vw, 2.4rem);
      font-weight: 900;
      color: #fff;
      margin-bottom: 24px;
      letter-spacing: 0.02em;
      text-shadow: 0 0 20px rgba(255,100,0,0.7);
    }
    .load-track {
      width: 160px;
      height: 3px;
      background: rgba(255,255,255,0.07);
      border-radius: 2px;
      overflow: hidden;
    }
    .load-fill {
      height: 100%;
      background: linear-gradient(90deg, #ff4400, #ffaa00);
      width: 0%;
      transition: width 0.4s ease;
      border-radius: 2px;
    }
    .load-sub {
      margin-top: 12px;
      font-size: 0.72rem;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.06em;
    }

    /* Reduced-motion: kill pulse/nudge animations */
    @media (prefers-reduced-motion: reduce) {
      .play-hint { animation: none; }
      #overlay, #overlay.hidden { transition: opacity 0.3s ease, visibility 0s linear; }
    }



    /* Visually-hidden for screen readers only */
    .sr-only {
      position: absolute;
      width: 1px; height: 1px;
      padding: 0; margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    /* hide emscripten built-ins */
    #status, #progress { display: none !important; }
  </style>
</head>
<body>

<script>
// ─── Protect the tab title from the pinball WASM overwriting it ──────────────
// Space Cadet sets document.title = "3D Pinball for Windows - Space Cadet"
// once it loads. We restore it and keep it restored via MutationObserver.
(function guardTitle() {
  var DESIRED = "Kyle's Links";
  if (document.title !== DESIRED) document.title = DESIRED;
  var titleEl = document.querySelector('title');
  if (!titleEl || !window.MutationObserver) return;
  var mo = new MutationObserver(function() {
    if (document.title !== DESIRED) document.title = DESIRED;
  });
  mo.observe(titleEl, { childList: true, subtree: true, characterData: true });
  // Also guard against direct assignments the observer might miss briefly
  setInterval(function() {
    if (document.title !== DESIRED) document.title = DESIRED;
  }, 500);
})();

// ─── Device detection ─────────────────────────────────────────────────────────
function isMobilePortrait() {
  return window.innerWidth <= 768 && window.innerHeight > window.innerWidth;
}
var IS_MOBILE = isMobilePortrait();

// Fraction of the game canvas width that is the pinball TABLE (left side).
var TABLE_FRAC = 0.64;

// ─── State ────────────────────────────────────────────────────────────────────
var gameReady       = false;
var inGameMode      = false;
var pendingLaunch   = false;
var launchTimeout   = null;

var overlay       = document.getElementById('overlay');
var paddleL       = document.getElementById('paddle-L');
var paddleR       = document.getElementById('paddle-R');
var loadFill      = document.getElementById('load-fill');
var loadSub       = document.getElementById('load-sub');
var loader        = document.getElementById('loader');
var desktopIcons  = document.getElementById('desktop-icons');
var gameControls  = document.getElementById('game-controls');
var muteBtn       = document.getElementById('mute-btn');
var backBtn       = document.getElementById('back-btn');

// ─── Emscripten Module ───────────────────────────────────────────────────────
var JSDELIVR_BASE = 'https://pinball.alula.me/';

var Module = {
  preRun: [],
  postRun: [],
  print:    function(t) { console.log(t); },
  printErr: function(t) { console.error(t); },
  locateFile: function(path) { return JSDELIVR_BASE + path; },
  canvas: (function() {
    var c = document.getElementById('canvas');
    c.addEventListener('webglcontextlost', function(e) { e.preventDefault(); }, false);
    return c;
  })(),
  setStatus: function(text) {
    if (!Module.setStatus._last) Module.setStatus._last = '';
    if (text === Module.setStatus._last) return;
    Module.setStatus._last = text;
    var m = text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
    if (m) {
      var pct = Math.round(100 * parseInt(m[2]) / parseInt(m[4]));
      loadFill.style.width = pct + '%';
      loadSub.textContent  = 'Loading game data\u2026 ' + pct + '%';
    } else if (text === '') {
      loadFill.style.width = '100%';
      loadSub.textContent  = 'Ready!';
      setTimeout(function() {
        loader.classList.add('fade');
        var c = document.getElementById('canvas');
        gameReady = true;
        (function waitForSize() {
          if (c.width > 0 && c.height > 0) {
            resizeCanvas();
            if (pendingLaunch) launchBall();
          } else {
            setTimeout(waitForSize, 50);
          }
        })();
        setTimeout(function() { loader.style.display = 'none'; }, 900);
      }, 350);
    } else {
      loadSub.textContent = text;
    }
  },
  totalDependencies: 0,
  monitorRunDependencies: function(left) {
    this.totalDependencies = Math.max(this.totalDependencies, left);
    var done = this.totalDependencies - left;
    Module.setStatus(left
      ? 'Preparing\u2026 (' + done + '\u202f/\u202f' + this.totalDependencies + ')'
      : '');
  }
};
Module.setStatus('Downloading\u2026');
window.onerror = function() { Module.setStatus('Error — check console'); };

// ─── Canvas sizing ────────────────────────────────────────────────────────────
function resizeCanvas() {
  var c = document.getElementById('canvas');
  if (!c || !c.width || !c.height) return;
  var nw = c.width, nh = c.height;
  var clip  = document.getElementById('canvas-clip');
  var bliss = document.getElementById('bliss-bg');

  if (isMobilePortrait()) {
    var scale    = window.innerWidth / (nw * TABLE_FRAC);
    var machineH = Math.round(nh * scale);
    var machineW = Math.round(nw * scale);
    c.style.width  = machineW + 'px';
    c.style.height = machineH + 'px';
    if (clip) {
      clip.style.width  = window.innerWidth + 'px';
      clip.style.height = machineH + 'px';
    }
    var aboveH = Math.max(0, window.innerHeight - machineH);
    if (bliss) bliss.style.height = aboveH + 'px';
  } else {
    var scale = Math.min(window.innerWidth / nw, window.innerHeight / nh);
    c.style.width  = Math.round(nw * scale) + 'px';
    c.style.height = Math.round(nh * scale) + 'px';
    if (clip)  { clip.style.width = ''; clip.style.height = ''; }
    if (bliss) bliss.style.height = '100%';
  }
}

window.addEventListener('resize', function() {
  IS_MOBILE = isMobilePortrait();
  resizeCanvas();
});

// ─── Key simulation ───────────────────────────────────────────────────────────
function fireKey(type, keyCode, key, code) {
  var c = document.getElementById('canvas');
  var opts = {
    bubbles: true, cancelable: true,
    key: key, code: code,
    keyCode: keyCode, which: keyCode, charCode: 0
  };
  [c, document, window].forEach(function(t) {
    try { t.dispatchEvent(new KeyboardEvent(type, opts)); } catch(e) {}
  });
}

var LDn = function() { fireKey('keydown', 90,  'z', 'KeyZ');  };
var LUp = function() { fireKey('keyup',   90,  'z', 'KeyZ');  };
var RDn = function() { fireKey('keydown', 191, '/', 'Slash'); };
var RUp = function() { fireKey('keyup',   191, '/', 'Slash'); };

function launchBall() {
  fireKey('keydown', 32, ' ', 'Space');
  setTimeout(function() { fireKey('keyup', 32, ' ', 'Space'); }, 750);
}

// ─── Game mode enter / exit ───────────────────────────────────────────────────
function enterGame() {
  if (inGameMode) return;
  inGameMode = true;
  paddleL.classList.add('active');
  paddleR.classList.add('active');

  overlay.classList.add('hidden');
  function onSlideUp(e) {
    if (e.propertyName !== 'transform') return;
    overlay.removeEventListener('transitionend', onSlideUp);
    if (inGameMode) desktopIcons.classList.add('show');
  }
  overlay.addEventListener('transitionend', onSlideUp);
}

function exitGame() {
  if (!inGameMode) return;
  inGameMode = false;
  pendingLaunch = false;
  paddleL.classList.remove('active');
  paddleR.classList.remove('active');

  desktopIcons.classList.remove('show');
  setTimeout(function() {
    overlay.classList.remove('hidden');
  }, 280);
}

// ESC returns to the links
window.addEventListener('keydown', function(e) {
  if (e.key === 'Escape' && inGameMode) exitGame();
});

// Back button
backBtn.addEventListener('click', function(e) { e.stopPropagation(); exitGame(); });

// Clicking the Bliss background (or gaps between desktop icons) exits game mode
var blissBg = document.getElementById('bliss-bg');
if (blissBg) blissBg.addEventListener('click', function() { exitGame(); });

// ─── Mute toggle ──────────────────────────────────────────────────────────────
// The Emscripten Space Cadet exposes AL (OpenAL) on the Module or via the
// AudioContext. We flip the master gain or the AudioContext.state to mute.
var muted = false;
function setMuted(v) {
  muted = v;
  muteBtn.textContent = v ? '🔇 Muted' : '🔊 Sound';
  muteBtn.setAttribute('aria-pressed', v ? 'true' : 'false');

  // Walk every AudioContext we can find and suspend/resume.
  try {
    var ctxs = [];
    if (window.Module && window.Module.SDL2 && window.Module.SDL2.audioContext) {
      ctxs.push(window.Module.SDL2.audioContext);
    }
    // Heuristic: Emscripten SDL audio stores a context on `Module`
    if (window.Module && window.Module.AL && window.Module.AL.currentCtx) {
      var al = window.Module.AL.currentCtx;
      if (al && al.audioCtx) ctxs.push(al.audioCtx);
    }
    ctxs.forEach(function(ctx) {
      if (!ctx) return;
      if (v && ctx.state === 'running') ctx.suspend();
      else if (!v && ctx.state === 'suspended') ctx.resume();
    });
  } catch (err) { /* silent */ }
}
muteBtn.addEventListener('click', function(e) {
  e.stopPropagation();
  setMuted(!muted);
});

// ─── Paddle controls ──────────────────────────────────────────────────────────
function bindPaddle(el, dn, up) {
  function press(e)  { e.preventDefault(); dn(); el.classList.add('lit');    }
  function release(e){ e.preventDefault(); up(); el.classList.remove('lit'); }
  el.addEventListener('mousedown',   press,   false);
  el.addEventListener('mouseup',     release, false);
  el.addEventListener('mouseleave',  release, false);
  el.addEventListener('touchstart',  press,   { passive: false });
  el.addEventListener('touchend',    release, { passive: false });
  el.addEventListener('touchcancel', release, false);
}
bindPaddle(paddleL, LDn, LUp);
bindPaddle(paddleR, RDn, RUp);

var cv = document.getElementById('canvas');

function tryLaunch() {
  if (gameReady) launchBall();
  else pendingLaunch = true;
}

cv.addEventListener('mousedown', function(e) {
  if (!inGameMode) { enterGame(); }
  tryLaunch();
  var mid = cv.getBoundingClientRect().left + cv.getBoundingClientRect().width / 2;
  (e.clientX < mid) ? LDn() : RDn();
});
cv.addEventListener('mouseup', function() { LUp(); RUp(); });

cv.addEventListener('touchstart', function(e) {
  e.preventDefault();
  if (!inGameMode) { enterGame(); }
  tryLaunch();

  var rect = cv.getBoundingClientRect();
  var visW = Math.min(rect.width, window.innerWidth);
  var leftZone  = rect.left + visW * 0.33;
  var rightZone = rect.left + visW * 0.67;
  for (var i = 0; i < e.changedTouches.length; i++) {
    var x = e.changedTouches[i].clientX;
    if (x < leftZone) {
      LDn();
    } else if (x > rightZone) {
      RDn();
    } else {
      fireKey('keydown', 32, ' ', 'Space');
      setTimeout(function() { fireKey('keyup', 32, ' ', 'Space'); }, 750);
    }
  }
}, { passive: false });

cv.addEventListener('touchend', function(e) {
  e.preventDefault(); LUp(); RUp();
}, { passive: false });

// Paddle buttons also launch the ball on press
[paddleL, paddleR].forEach(function(p) {
  p.addEventListener('touchstart', function() { tryLaunch(); }, { passive: true });
  p.addEventListener('mousedown',  function() { tryLaunch(); });
});

// Keyboard: pressing any flipper key on the page also enters game mode
window.addEventListener('keydown', function(e) {
  if (!inGameMode) {
    if (e.code === 'KeyZ' || e.code === 'Slash' || e.code === 'Space') {
      enterGame();
      tryLaunch();
    }
  }
});
</script>
