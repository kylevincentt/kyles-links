<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kyle's Links</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --neon-pink:   #ff2d78;
      --neon-purple: #b026ff;
      --neon-yellow: #ffe600;
      --neon-cyan:   #00f6ff;
      --dark-bg:     #0d0118;
      --card-bg:     rgba(10, 1, 24, 0.85);
      --grid-color:  rgba(150, 0, 255, 0.4);
    }

    html, body { height: 100%; }

    body {
      font-family: 'Press Start 2P', monospace;
      color: #fff;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,.07) 2px, rgba(0,0,0,.07) 4px
      );
      z-index: 999;
    }

    /* FIXED FULL-SCREEN SCENE */
    .scene {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    .sky {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        #040010  0%,
        #0c002a  15%,
        #1a0042  30%,
        #38005e  45%,
        #7a0082  58%,
        #c03068  72%,
        #e05838  85%,
        #e87030  100%
      );
    }

    .stars {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(1px 1px at  6%  4%,  #fff 100%, transparent),
        radial-gradient(1px 1px at 14%  9%,  #fff 100%, transparent),
        radial-gradient(1px 1px at 23%  3%,  #fff 100%, transparent),
        radial-gradient(2px 2px at 35%  7%,  #fff 100%, transparent),
        radial-gradient(1px 1px at 47%  2%,  #fff 100%, transparent),
        radial-gradient(1px 1px at 58% 11%,  #fff 100%, transparent),
        radial-gradient(1px 1px at 67%  5%,  #fff 100%, transparent),
        radial-gradient(1px 1px at 78%  8%,  #fff 100%, transparent),
        radial-gradient(2px 2px at 89%  3%,  #fff 100%, transparent),
        radial-gradient(1px 1px at 94% 14%,  #fff 100%, transparent),
        radial-gradient(1px 1px at 10% 20%,  rgba(255,255,255,.7) 100%, transparent),
        radial-gradient(1px 1px at 42% 16%,  rgba(255,255,255,.6) 100%, transparent),
        radial-gradient(1px 1px at 73% 22%,  rgba(255,255,255,.5) 100%, transparent),
        radial-gradient(1px 1px at 20% 28%,  rgba(255,255,255,.4) 100%, transparent),
        radial-gradient(1px 1px at 85% 26%,  rgba(255,255,255,.6) 100%, transparent),
        radial-gradient(1px 1px at 52% 32%,  rgba(255,255,255,.3) 100%, transparent);
      animation: twinkle 4s ease-in-out infinite alternate;
    }
    @keyframes twinkle {
      0%   { opacity: .6; }
      50%  { opacity: 1;  }
      100% { opacity: .4; }
    }

    .sun-wrap {
      position: absolute;
      top: 8%;
      left: 50%;
      transform: translateX(-50%);
      width: min(220px, 50vw);
      height: min(220px, 50vw);
    }
    .sun {
      width: 100%; height: 100%;
      border-radius: 50%;
      background: linear-gradient(to bottom, #ffb030 0%, #ff5a18 45%, #cc1a08 100%);
      box-shadow: 0 0 60px 28px rgba(255,100,20,.7), 0 0 130px 70px rgba(255,70,10,.3);
      animation: sunPulse 3s ease-in-out infinite;
      overflow: hidden;
    }
    @keyframes sunPulse {
      0%,100% { box-shadow: 0 0 60px 28px rgba(255,100,20,.7), 0 0 130px 70px rgba(255,70,10,.3); }
      50%      { box-shadow: 0 0 80px 38px rgba(255,140,40,.9), 0 0 160px 90px rgba(255,70,10,.4); }
    }
    .sun-lines {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 55%;
      background: repeating-linear-gradient(
        to bottom,
        rgba(110,5,5,.9) 0px, rgba(110,5,5,.9) 7px,
        transparent 7px, transparent 15px
      );
    }

    .mountains {
      position: absolute;
      left: 0; right: 0;
      bottom: 46%;
      height: 0;
      pointer-events: none;
    }
    .mountains::before {
      content: '';
      position: absolute;
      bottom: 0; left: -4%;
      width: 0; height: 0;
      border-left: 24vw solid transparent;
      border-right: 20vw solid transparent;
      border-bottom: 20vw solid #110028;
    }
    .mountains::after {
      content: '';
      position: absolute;
      bottom: 0; right: -4%;
      width: 0; height: 0;
      border-left: 20vw solid transparent;
      border-right: 24vw solid transparent;
      border-bottom: 20vw solid #110028;
    }

    .horizon {
      position: absolute;
      bottom: 46%;
      left: 0; right: 0;
      height: 3px;
      background: linear-gradient(to right, transparent 0%, var(--neon-pink) 15%, #ff90cc 50%, var(--neon-pink) 85%, transparent 100%);
      box-shadow: 0 0 20px 5px rgba(255,45,120,.75);
    }

    .grid-floor {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 47%;
      perspective: 350px;
      overflow: hidden;
    }
    .grid-inner {
      position: absolute;
      bottom: 0; left: -60%; right: -60%;
      height: 100%;
      background-image:
        linear-gradient(to right, var(--grid-color) 1px, transparent 1px),
        linear-gradient(to bottom, var(--grid-color) 1px, transparent 1px);
      background-size: 56px 56px;
      transform: rotateX(74deg);
      transform-origin: bottom center;
      animation: gridScroll 2.2s linear infinite;
    }
    @keyframes gridScroll {
      0%   { background-position: 0 0; }
      100% { background-position: 0 56px; }
    }

    /* UI ON TOP */
    .ui {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 16px 40px;
    }

    .site-title {
      font-size: clamp(22px, 6.5vw, 42px);
      color: var(--neon-yellow);
      text-align: center;
      letter-spacing: 4px;
      text-shadow:
        0 0 10px rgba(255,230,0,.95),
        0 0 28px rgba(255,200,0,.65),
        0 0 55px rgba(255,180,0,.35),
        4px 4px 0 rgba(160,70,0,.8);
      margin-top: clamp(20px, 4vh, 36px);
      white-space: nowrap;
      animation: titleFlicker 6s ease-in-out infinite;
    }
    @keyframes titleFlicker {
      0%,91%,95%,100% { opacity: 1; }
      93% { opacity: .78; }
    }

    .cards {
      width: 100%;
      max-width: 460px;
      margin-top: clamp(16px, 3vh, 28px);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .card {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--card-bg);
      border: 2px solid var(--neon-pink);
      border-radius: 5px;
      padding: 12px 14px;
      text-decoration: none;
      color: #fff;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      transition: transform .14s ease, box-shadow .14s ease, border-color .14s ease;
      opacity: 0;
      transform: translateY(22px);
    }
    .card.visible { animation: slideUp .42s ease forwards; }
    @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }

    .card::before, .card::after {
      content: '';
      position: absolute;
      width: 8px; height: 8px;
      border-color: var(--neon-purple);
      border-style: solid;
    }
    .card::before { top: -2px; left: -2px; border-width: 2px 0 0 2px; }
    .card::after  { bottom: -2px; right: -2px; border-width: 0 2px 2px 0; }

    .card:hover {
      transform: translateY(-3px) scale(1.016);
      border-color: var(--neon-cyan);
      box-shadow: 0 0 14px rgba(0,246,255,.5), 0 0 34px rgba(0,246,255,.18), inset 0 0 22px rgba(0,246,255,.05);
    }

    .shimmer {
      position: absolute; inset: 0;
      background: linear-gradient(105deg, transparent 30%, rgba(255,255,255,.08) 50%, transparent 70%);
      transform: translateX(-100%);
      transition: transform .38s ease;
      pointer-events: none;
    }
    .card:hover .shimmer { transform: translateX(100%); }

    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(0,246,255,.32);
      transform: scale(0);
      animation: rippleAnim .5s linear;
      pointer-events: none;
    }
    @keyframes rippleAnim { to { transform: scale(4); opacity: 0; } }

    .card-icon {
      width: 52px; height: 52px;
      flex-shrink: 0;
      background: rgba(25,0,50,.9);
      border: 2px solid var(--neon-purple);
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      position: relative;
      overflow: hidden;
    }
    .card-icon::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,.1) 0%, transparent 60%);
    }

    .card-text { flex: 1; }
    .card-name {
      font-size: clamp(10px, 2.8vw, 13px);
      color: var(--neon-yellow);
      letter-spacing: 1px;
      text-shadow: 0 0 8px rgba(255,230,0,.5);
      line-height: 1.5;
    }
    .card-url {
      font-size: 8px;
      color: rgba(255,255,255,.5);
      margin-top: 4px;
      letter-spacing: .4px;
    }

    .card-arrow {
      font-size: 14px;
      color: var(--neon-pink);
      text-shadow: 0 0 8px var(--neon-pink);
      animation: arrowBlink 1.4s steps(1) infinite;
    }
    @keyframes arrowBlink {
      0%,49% { opacity: 1; }
      50%,100% { opacity: .2; }
    }

    .contact-card {
      background: var(--card-bg);
      border: 2px solid var(--neon-pink);
      border-radius: 5px;
      padding: 18px 14px 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 9px;
      opacity: 0;
      transform: translateY(22px);
      position: relative;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }
    .contact-card::before, .contact-card::after {
      content: '';
      position: absolute;
      width: 8px; height: 8px;
      border-color: var(--neon-purple);
      border-style: solid;
    }
    .contact-card::before { top: -2px; left: -2px; border-width: 2px 0 0 2px; }
    .contact-card::after  { bottom: -2px; right: -2px; border-width: 0 2px 2px 0; }
    .contact-card.visible { animation: slideUp .42s ease forwards; }

    .contact-icon { font-size: 26px; }
    .contact-title {
      font-size: 13px;
      color: var(--neon-yellow);
      letter-spacing: 1px;
      text-shadow: 0 0 8px rgba(255,230,0,.5);
    }
    .contact-sub {
      font-size: 8px;
      color: rgba(255,255,255,.6);
      text-align: center;
      line-height: 1.9;
      letter-spacing: .5px;
    }
    .email-btn {
      display: inline-block;
      background: var(--neon-pink);
      color: #0d0118;
      font-family: 'Press Start 2P', monospace;
      font-size: 10px;
      padding: 10px 22px;
      border-radius: 4px;
      text-decoration: none;
      letter-spacing: 1px;
      border: none;
      cursor: pointer;
      transition: transform .14s ease, box-shadow .14s ease;
      box-shadow: 0 0 12px rgba(255,45,120,.6);
      margin-top: 2px;
    }
    .email-btn:hover { transform: scale(1.05); box-shadow: 0 0 22px rgba(255,45,120,1); }
    .email-btn:active { transform: scale(.97); }

    .contact-email {
      font-size: 7px;
      color: rgba(255,255,255,.38);
      letter-spacing: .5px;
    }

    .footer {
      padding: 22px 0 8px;
      font-size: 18px;
      animation: heartbeat 1.4s ease infinite;
    }
    @keyframes heartbeat {
      0%,100% { transform: scale(1); }
      14% { transform: scale(1.3); }
      28% { transform: scale(1); }
      42% { transform: scale(1.2); }
      56% { transform: scale(1); }
    }

    .sparkle {
      position: fixed;
      pointer-events: none;
      font-size: 10px;
      z-index: 998;
      animation: sparkleFade .8s ease forwards;
    }
    @keyframes sparkleFade {
      0%   { opacity: 1; transform: scale(1) translateY(0); }
      100% { opacity: 0; transform: scale(1.8) translateY(-30px); }
    }

    @media (max-width: 420px) {
      .card-name { font-size: 10px; }
      .sun-wrap  { top: 6%; }
    }
  </style>
</head>
<body>

  <div class="scene">
    <div class="sky"></div>
    <div class="stars"></div>
    <div class="sun-wrap">
      <div class="sun"><div class="sun-lines"></div></div>
    </div>
    <div class="mountains"></div>
    <div class="horizon"></div>
    <div class="grid-floor"><div class="grid-inner"></div></div>
  </div>

  <div class="ui">
    <h1 class="site-title">KYLE'S LINKS</h1>

    <main class="cards" id="cards">

      <a class="card" href="https://dopl.work" target="_blank" rel="noopener">
        <div class="shimmer"></div>
        <div class="card-icon">🌐</div>
        <div class="card-text">
          <div class="card-name">DOPPEL</div>
          <div class="card-url">(dopl.work)</div>
        </div>
        <span class="card-arrow">▶</span>
      </a>

      <a class="card" href="https://keepsake.it.com" target="_blank" rel="noopener">
        <div class="shimmer"></div>
        <div class="card-icon">🎁</div>
        <div class="card-text">
          <div class="card-name">KEEPSAKE</div>
          <div class="card-url">(keepsake.it.com)</div>
        </div>
        <span class="card-arrow">▶</span>
      </a>

      <a class="card" href="https://christcornerstone.org" target="_blank" rel="noopener">
        <div class="shimmer"></div>
        <div class="card-icon">⛪</div>
        <div class="card-text">
          <div class="card-name">CORNERSTONE</div>
          <div class="card-url">(ChristCornerstone.org)</div>
        </div>
        <span class="card-arrow">▶</span>
      </a>

      <a class="card" href="https://ebay.com" target="_blank" rel="noopener">
        <div class="shimmer"></div>
        <div class="card-icon">🛒</div>
        <div class="card-text">
          <div class="card-name">THE VIRAL<br>FUNNEL SCOOP</div>
          <div class="card-url">(eBay.com)</div>
        </div>
        <span class="card-arrow">▶</span>
      </a>

      <div class="contact-card" id="contact">
        <div class="contact-icon">✉️</div>
        <div class="contact-title">CONTACT ME</div>
        <div class="contact-sub">Have a question or want<br>to connect?</div>
        <a class="email-btn" href="mailto:kylevcrum@gmail.com">EMAIL ME</a>
        <div class="contact-email">kylevcrum@gmail.com</div>
      </div>

    </main>

    <div class="footer">💗</div>
  </div>

  <script>
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const el = entry.target;
          setTimeout(() => el.classList.add('visible'), el.dataset.delay || 0);
          observer.unobserve(el);
        }
      });
    }, { threshold: 0.08 });
    document.querySelectorAll('.card, .contact-card').forEach((el, i) => {
      el.dataset.delay = i * 85;
      observer.observe(el);
    });

    document.querySelectorAll('.card').forEach(card => {
      card.addEventListener('click', function(e) {
        const r = document.createElement('span');
        r.className = 'ripple';
        const rect = this.getBoundingClientRect();
        const size = Math.max(rect.width, rect.height);
        r.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX-rect.left-size/2}px;top:${e.clientY-rect.top-size/2}px`;
        this.appendChild(r);
        r.addEventListener('animationend', () => r.remove());
      });
    });

    const SPARKS = ['✦','✧','★','✨','⋆','·'];
    document.addEventListener('click', (e) => {
      for (let i = 0; i < 5; i++) {
        const el = document.createElement('span');
        el.className = 'sparkle';
        el.textContent = SPARKS[Math.floor(Math.random() * SPARKS.length)];
        el.style.left  = (e.clientX + (Math.random()-.5)*40) + 'px';
        el.style.top   = (e.clientY + (Math.random()-.5)*40) + 'px';
        el.style.color = ['#ffe600','#ff2d78','#00f6ff','#b026ff'][Math.floor(Math.random()*4)];
        el.style.animationDelay = (i*60) + 'ms';
        document.body.appendChild(el);
        el.addEventListener('animationend', () => el.remove());
      }
    });
  <\/script>
</body>
</html>
