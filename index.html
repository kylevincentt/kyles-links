<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kyle's Links</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #04001a; display: flex; justify-content: center; min-height: 100vh; }
    /* FIX 1: align-self: flex-start prevents the flex container from
       stretching .page to 100vh. Without this, percentage-based `top`
       values on the .hit overlay anchors are calculated against the
       inflated viewport height instead of the image height, shifting
       every tap target far below the actual button art. */
    .page { position: relative; width: 100%; max-width: 480px; margin: 0 auto; align-self: flex-start; }
    /* FIX 2: add vendor-prefixed image-rendering values so pixel art
       stays crisp on older iOS Safari (-webkit-optimize-contrast) and
       Firefox (crisp-edges). Without these the browser anti-aliases the
       upscaled JPEG and it looks blurry on high-DPI mobile screens. */
    .bg-img { width: 100%; display: block; image-rendering: -webkit-optimize-contrast; image-rendering: pixelated; image-rendering: crisp-edges; }

    .page::after {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0,0,0,.06) 3px,
        rgba(0,0,0,.06) 4px
      );
      z-index: 5;
    }

    /* FIX 3: touch-action: manipulation removes the 300ms tap delay on
       mobile browsers that still apply it, making taps feel instant. */
    .hit {
      position: absolute;
      left: 3%;
      width: 94%;
      cursor: pointer;
      border-radius: 6px;
      transition: background .18s ease, box-shadow .18s ease;
      z-index: 10;
      text-decoration: none;
      display: block;
      touch-action: manipulation;
    }
    .hit:hover {
      background: rgba(0,246,255,.09);
      box-shadow: 0 0 20px rgba(0,246,255,.4), inset 0 0 20px rgba(0,246,255,.05);
    }

    .hit-doppel      { top: 47.0%; height: 6.5%; }
    .hit-keepsake    { top: 54.2%; height: 6.5%; }
    .hit-cornerstone { top: 61.4%; height: 6.5%; }
    .hit-viral       { top: 68.6%; height: 6.5%; }
    .hit-email       { left: 18%; width: 64%; top: 78.0%; height: 5.0%; }

    .hit-coffee {
      position: absolute;
      left: 72%;
      width: 24%;
      top: 91.5%;
      height: 7%;
      border-radius: 50%;
      cursor: pointer;
      z-index: 10;
      touch-action: manipulation;
      animation: coffeeBounce 3s ease-in-out 2s infinite;
    }
    .hit-coffee:hover { background: rgba(255,230,0,.12); }

    @keyframes coffeeBounce {
      0%,82%,100% { transform: translateY(0); }
      88%          { transform: translateY(-6px); }
      94%          { transform: translateY(-3px); }
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: #fff;
      border-radius: 50%;
      animation: twinkle var(--d,2s) ease-in-out var(--delay,0s) infinite;
      opacity: 0;
      pointer-events: none;
    }
    @keyframes twinkle {
      0%,100% { opacity: 0; transform: scale(1); }
      50%      { opacity: var(--op,.85); transform: scale(1.7); }
    }

    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(0,246,255,.25);
      pointer-events: none;
      transform: scale(0);
      animation: rippleAnim .55s linear forwards;
      z-index: 20;
    }
    @keyframes rippleAnim { to { transform: scale(5); opacity: 0; } }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(4,0,26,.9);
      z-index: 100;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
    }
    .modal-overlay.open { display: flex; animation: fadeIn .22s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .popup {
      font-family: 'Press Start 2P', monospace;
      background: #0d0118;
      border: 3px solid #ff2d78;
      border-radius: 10px;
      padding: 30px 24px 24px;
      width: min(90vw, 340px);
      position: relative;
      box-shadow:
        0 0 0 1px #b026ff,
        0 0 32px rgba(255,45,120,.65),
        0 0 70px rgba(176,38,255,.35);
      animation: popIn .28s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes popIn {
      from { transform: scale(.65) translateY(40px); opacity: 0; }
      to   { transform: scale(1)   translateY(0);    opacity: 1; }
    }

    .popup-close {
      position: absolute;
      top: 10px; right: 14px;
      background: none;
      border: none;
      color: #ff2d78;
      font-size: 16px;
      cursor: pointer;
      font-family: 'Press Start 2P', monospace;
      line-height: 1;
    }
    .popup-close:hover { color: #fff; }

    .popup-mug {
      text-align: center;
      font-size: 38px;
      margin-bottom: 14px;
      animation: mugWiggle 2.5s ease-in-out infinite;
    }
    @keyframes mugWiggle {
      0%,100% { transform: rotate(0deg); }
      25%      { transform: rotate(-8deg); }
      75%      { transform: rotate(8deg); }
    }

    .popup-title {
      font-size: clamp(9px, 2.6vw, 12px);
      color: #ffe600;
      text-align: center;
      letter-spacing: 1px;
      line-height: 1.7;
      text-shadow: 0 0 12px rgba(255,230,0,.75);
      margin-bottom: 10px;
    }

    .popup-sub {
      font-size: 8px;
      color: #b026ff;
      text-align: center;
      margin-bottom: 20px;
      letter-spacing: 1px;
    }

    .popup-btns { display: flex; flex-direction: column; gap: 10px; }

    .popup-btn {
      display: block;
      text-align: center;
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(8px, 2vw, 10px);
      padding: 12px 10px;
      border-radius: 6px;
      text-decoration: none;
      border: 2px solid transparent;
      transition: transform .12s ease, box-shadow .12s ease;
      letter-spacing: 1px;
    }
    .popup-btn:hover { transform: scale(1.04); box-shadow: 0 0 14px rgba(255,255,255,.3); }
    .btn-venmo   { background: #008cff; color: #fff; border-color: #006acc; }
    .btn-cashapp { background: #00c244; color: #fff; border-color: #009933; }
    .btn-paypal  { background: #ffc439; color: #1a1a1a; border-color: #e6ad20; }
  </style>
</head>

  <script>
    (function() {
      var container = document.getElementById('stars');
      var img = document.getElementById('bgImg');
      function spawnStars() {
        for (var i = 0; i < 22; i++) {
          var s = document.createElement('div');
          s.className = 'star';
          s.style.left = (Math.random() * 95 + 2) + '%';
          s.style.top  = (Math.random() * 28) + '%';
          var dur = (1.4 + Math.random() * 2.2).toFixed(2) + 's';
          var del = (Math.random() * 3).toFixed(2) + 's';
          var op  = (0.5 + Math.random() * 0.5).toFixed(2);
          s.style.setProperty('--d', dur);
          s.style.setProperty('--delay', del);
          s.style.setProperty('--op', op);
          container.appendChild(s);
        }
      }
      if (img.complete) spawnStars();
      else img.addEventListener('load', spawnStars);
    })();

    document.querySelectorAll('.hit').forEach(function(el) {
      el.addEventListener('click', function(e) {
        var rect = el.getBoundingClientRect();
        var r = document.createElement('div');
        r.className = 'ripple';
        var size = Math.max(rect.width, rect.height);
        r.style.width = r.style.height = size + 'px';
        r.style.left  = (e.clientX - rect.left  - size/2) + 'px';
        r.style.top   = (e.clientY - rect.top   - size/2) + 'px';
        el.appendChild(r);
        r.addEventListener('animationend', function() { r.remove(); });
      });
    });

    var coffeeBtn  = document.getElementById('coffeeBtn');
    var modal      = document.getElementById('coffeeModal');
    var closeBtn   = document.getElementById('closeModal');
    coffeeBtn.addEventListener('click', function() { modal.classList.add('open'); });
    closeBtn.addEventListener('click',  function() { modal.classList.remove('open'); });
    modal.addEventListener('click', function(e) { if (e.target === modal) modal.classList.remove('open'); });
    document.addEventListener('keydown', function(e) { if (e.key === 'Escape') modal.classList.remove('open'); });
  </script>
