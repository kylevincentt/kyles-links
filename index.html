<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Kyle's Links</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #04000e;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      height: 100dvh;
      width: 100vw;
    }

    /* ── Game canvas wrapper ───────────────────────────────────────────────── */
    #game-wrapper {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #04000e;
      z-index: 1;
    }

    /* Portrait mobile: left-align so canvas overflows right (scoreboard hidden);
       bottom-align the table so base touches viewport bottom */
    @media (max-width: 768px) and (orientation: portrait) {
      #game-wrapper {
        align-items: flex-end;
        justify-content: flex-start;
        overflow: hidden;
        padding-top: 80px; /* reserve space for score strip above machine */
      }
    }

    canvas#canvas {
      /* Never display:none — WebGL needs the canvas visible to initialize.
         The #loader overlay (z-index:100) covers it during loading. */
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    /* ── Scroll layer (captures scroll, passes clicks through when gaming) ── */
    #scroll-layer {
      position: fixed;
      inset: 0;
      overflow-y: scroll;
      overflow-x: hidden;
      z-index: 10;
      -webkit-overflow-scrolling: touch;
    }
    #scroll-spacer { height: 300vh; }

    /* ── Links overlay ─────────────────────────────────────────────────────── */
    #overlay {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 20px 40px;
      pointer-events: none;
      transition: opacity 0.55s cubic-bezier(0.4, 0, 0.2, 1),
                  visibility 0.55s cubic-bezier(0.4, 0, 0.2, 1);
    }
    #overlay.hidden {
      opacity: 0;
      visibility: hidden;
    }

    /* dark scrim only behind buttons for readability */
    #overlay::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(
        ellipse 70% 65% at 50% 48%,
        rgba(0,0,0,0.62) 0%,
        transparent 100%
      );
      pointer-events: none;
    }

    .site-title {
      position: relative;
      font-size: clamp(2rem, 9vw, 4.5rem);
      font-weight: 900;
      color: #fff;
      text-align: center;
      letter-spacing: 0.02em;
      margin-bottom: 28px;
      text-shadow:
        0 0 8px  rgba(255, 120,  30, 1.0),
        0 0 24px rgba(255,  80,   0, 0.7),
        0 0 60px rgba(255,  40,   0, 0.35),
        0 0 100px rgba(255, 160, 60, 0.15);
    }

    .links {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 11px;
      width: min(310px, 86vw);
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 13px 20px;
      background: rgba(255,255,255,0.09);
      backdrop-filter: blur(20px) saturate(1.5);
      -webkit-backdrop-filter: blur(20px) saturate(1.5);
      border: 1.5px solid rgba(255,255,255,0.18);
      border-radius: 100px;
      color: #fff;
      font-size: 0.93rem;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      pointer-events: auto;
      transition: background 0.2s, border-color 0.2s, transform 0.15s, box-shadow 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .link-btn svg { flex-shrink: 0; opacity: 0.85; }
    .link-btn:hover {
      background: rgba(255,255,255,0.18);
      border-color: rgba(255,160,60,0.5);
      box-shadow: 0 0 20px rgba(255,100,0,0.2);
      transform: translateY(-1px);
    }
    .link-btn:active { transform: scale(0.97); }

    /* scroll hint */
    .scroll-hint {
      position: relative;
      margin-top: 22px;
      font-size: 0.76rem;
      font-weight: 500;
      color: rgba(255,255,255,0.4);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      animation: nudge 2.4s ease-in-out infinite;
    }
    .scroll-hint .arr { font-size: 1rem; }
    @keyframes nudge {
      0%, 100% { transform: translateY(0);   opacity: 0.4; }
      50%       { transform: translateY(6px); opacity: 0.7; }
    }

    /* ── Paddle tap zones (game mode) ─────────────────────────────────────── */
    .paddle {
      position: fixed;
      bottom: 0;
      height: 42%;
      width: 40%;
      z-index: 30;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.45s ease;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
      display: flex;
      align-items: flex-end;
      padding-bottom: 18px;
    }
    .paddle.active {
      opacity: 1;
      pointer-events: auto;
    }
    .paddle.lit { filter: brightness(1.6); }

    #paddle-L {
      left: 0;
      background: radial-gradient(ellipse 100% 80% at 0% 100%, rgba(60,180,255,0.18) 0%, transparent 70%);
      border-top-right-radius: 60%;
      justify-content: flex-start;
      padding-left: 14px;
    }
    #paddle-R {
      right: 0;
      background: radial-gradient(ellipse 100% 80% at 100% 100%, rgba(60,180,255,0.18) 0%, transparent 70%);
      border-top-left-radius: 60%;
      justify-content: flex-end;
      padding-right: 14px;
    }
    .paddle-label {
      font-size: 0.6rem;
      font-weight: 700;
      color: rgba(255,255,255,0.45);
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    /* On mobile portrait: paddles sit at the very bottom (default bottom: 0) */

    /* ── Back pill ──────────────────────────────────────────────────────────── */
    #back-pill {
      position: fixed;
      top: 14px;    /* on desktop sits near top; on mobile lands in score strip */
      left: 50%;
      transform: translateX(-50%);
      z-index: 35;
      background: rgba(8, 4, 20, 0.82);
      border: 1px solid rgba(255,255,255,0.14);
      color: rgba(255,255,255,0.6);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 8px 20px;
      border-radius: 100px;
      cursor: pointer;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.45s ease;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
    }
    #back-pill.show { opacity: 1; pointer-events: auto; }
    #back-pill:hover { color: #fff; border-color: rgba(255,255,255,0.3); }

    /* ── Mobile score strip (portrait only, sits above machine) ─────────────── */
    #mobile-score {
      display: none;               /* hidden on desktop / landscape */
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 80px;
      background: rgba(4, 0, 14, 0.96);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      z-index: 28;
      align-items: stretch;
      overflow: hidden;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s ease;
    }
    #mobile-score.show { opacity: 1; }
    @media (max-width: 768px) and (orientation: portrait) {
      #mobile-score { display: flex; }
    }
    #score-mirror {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* ── Launch hint (portrait mobile, game-mode, before ball launch) ───────── */
    #launch-hint {
      display: none;
      position: fixed;
      bottom: 36px;               /* lower portion of machine, above paddles */
      left: 50%;
      transform: translateX(-50%);
      z-index: 35;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.35s ease;
      animation: nudge 2s ease-in-out infinite;
    }
    #launch-hint.show { opacity: 1; }
    @media (max-width: 768px) and (orientation: portrait) {
      #launch-hint { display: block; }
    }

    /* ── Loading screen ─────────────────────────────────────────────────────── */
    #loader {
      position: fixed;
      inset: 0;
      background: #04000e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.8s ease;
    }
    #loader.fade { opacity: 0; pointer-events: none; }

    .load-title {
      font-size: clamp(1.6rem, 6vw, 2.4rem);
      font-weight: 900;
      color: #fff;
      margin-bottom: 24px;
      letter-spacing: 0.02em;
      text-shadow: 0 0 20px rgba(255,100,0,0.7);
    }
    .load-track {
      width: 160px;
      height: 3px;
      background: rgba(255,255,255,0.07);
      border-radius: 2px;
      overflow: hidden;
    }
    .load-fill {
      height: 100%;
      background: linear-gradient(90deg, #ff4400, #ffaa00);
      width: 0%;
      transition: width 0.4s ease;
      border-radius: 2px;
    }
    .load-sub {
      margin-top: 12px;
      font-size: 0.72rem;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.06em;
    }

    /* hide emscripten built-ins */
    #status, #progress { display: none !important; }
  </style>
</head>

<script>
// ─── Device detection ─────────────────────────────────────────────────────────
function isMobilePortrait() {
  return window.innerWidth <= 768 && window.innerHeight > window.innerWidth;
}
// Snapshot at load — used in event handlers that fire after initial setup
var IS_MOBILE = isMobilePortrait();

// Fraction of the game canvas width that is the pinball TABLE (left side).
// The scoreboard occupies the right ~36% of the canvas.
// Adjust this if the table feels too narrow or the scoreboard peeks through.
var TABLE_FRAC = 0.64;

// ─── State ────────────────────────────────────────────────────────────────────
var gameReady       = false;
var inGameMode      = false;
var ballLaunched    = false;
var pendingLaunch   = false;
var bottomTriggered = false;
var launchTimeout   = null;

var overlay     = document.getElementById('overlay');
var paddleL     = document.getElementById('paddle-L');
var paddleR     = document.getElementById('paddle-R');
var backPill    = document.getElementById('back-pill');
var loadFill    = document.getElementById('load-fill');
var loadSub     = document.getElementById('load-sub');
var loader      = document.getElementById('loader');
var launchHint  = document.getElementById('launch-hint');
var mobileScore = document.getElementById('mobile-score');
var scoreMirror = document.getElementById('score-mirror');
var scoreCtx    = scoreMirror ? scoreMirror.getContext('2d') : null;
var scoreRaf    = null;

// ─── Patch canvas.getContext to request preserveDrawingBuffer ────────────────
// Without this, WebGL clears its framebuffer after each frame and drawImage()
// on the WebGL canvas returns black. Must happen before Emscripten calls getContext.
(function() {
  var c = document.getElementById('canvas');
  var orig = c.getContext.bind(c);
  c.getContext = function(type, attrs) {
    if (type === 'webgl' || type === 'webgl2' || type === 'experimental-webgl') {
      attrs = Object.assign({}, attrs || {}, { preserveDrawingBuffer: true });
    }
    return orig(type, attrs);
  };
})();

// ─── Emscripten Module (must exist before SpaceCadetPinball.js loads) ────────
var JSDELIVR_BASE = 'https://cdn.jsdelivr.net/gh/alula/SpaceCadetPinball@gh-pages/';

var Module = {
  preRun: [],
  postRun: [],
  print:    function(t) { console.log(t); },
  printErr: function(t) { console.error(t); },
  // Redirect all game assets (.wasm, .data) to jsDelivr CDN
  locateFile: function(path) {
    return JSDELIVR_BASE + path;
  },
  canvas: (function() {
    var c = document.getElementById('canvas');
    c.addEventListener('webglcontextlost', function(e) { e.preventDefault(); }, false);
    return c;
  })(),
  setStatus: function(text) {
    if (!Module.setStatus._last) Module.setStatus._last = '';
    if (text === Module.setStatus._last) return;
    Module.setStatus._last = text;
    var m = text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
    if (m) {
      var pct = Math.round(100 * parseInt(m[2]) / parseInt(m[4]));
      loadFill.style.width = pct + '%';
      loadSub.textContent  = 'Loading game data\u2026 ' + pct + '%';
    } else if (text === '') {
      loadFill.style.width = '100%';
      loadSub.textContent  = 'Ready!';
      setTimeout(function() {
        loader.classList.add('fade');
        var c = document.getElementById('canvas');
        gameReady = true;
        // Poll until canvas has real dimensions (WebGL init may lag behind setStatus)
        (function waitForSize() {
          if (c.width > 0 && c.height > 0) {
            resizeCanvas();
            startScoreMirror();
            if (pendingLaunch) launchBall();
          } else {
            setTimeout(waitForSize, 50);
          }
        })();
        setTimeout(function() { loader.style.display = 'none'; }, 900);
      }, 350);
    } else {
      loadSub.textContent = text;
    }
  },
  totalDependencies: 0,
  monitorRunDependencies: function(left) {
    this.totalDependencies = Math.max(this.totalDependencies, left);
    var done = this.totalDependencies - left;
    Module.setStatus(left
      ? 'Preparing\u2026 (' + done + '\u202f/\u202f' + this.totalDependencies + ')'
      : '');
  }
};
Module.setStatus('Downloading\u2026');
window.onerror = function() { Module.setStatus('Error — check console'); };

// ─── Canvas sizing ────────────────────────────────────────────────────────────
function resizeCanvas() {
  var c = document.getElementById('canvas');
  if (!c || !c.width || !c.height) return;
  var nw = c.width, nh = c.height;

  if (isMobilePortrait()) {
    // Scale so the TABLE portion (left TABLE_FRAC of canvas) = screen width.
    // The scoreboard extends to the right and is clipped by game-wrapper's overflow:hidden.
    var scale = window.innerWidth / (nw * TABLE_FRAC);
    c.style.width  = (nw * scale) + 'px';
    c.style.height = (nh * scale) + 'px';
  } else {
    // Desktop / landscape: fit full game on screen
    var scale = Math.min(window.innerWidth / nw, window.innerHeight / nh);
    c.style.width  = (nw * scale) + 'px';
    c.style.height = (nh * scale) + 'px';
  }
}

window.addEventListener('resize', function() {
  IS_MOBILE = isMobilePortrait();
  resizeCanvas();
});

// ─── Score mirror (portrait mobile only) ─────────────────────────────────────
// Copies the scoreboard region from the WebGL game canvas into the strip below.
// Works when Emscripten preserves the drawing buffer (most builds do).
function startScoreMirror() {
  if (!isMobilePortrait() || !scoreCtx) return;
  if (scoreRaf) return; // already running

  var gameCanvas = document.getElementById('canvas');

  function mirrorLoop() {
    if (!gameCanvas.width || !gameCanvas.height) {
      scoreRaf = requestAnimationFrame(mirrorLoop);
      return;
    }

    // Sync canvas element dimensions to CSS size of the strip container
    var stripW = mobileScore.offsetWidth;
    var stripH = mobileScore.offsetHeight;
    if (scoreMirror.width !== stripW)  scoreMirror.width  = stripW;
    if (scoreMirror.height !== stripH) scoreMirror.height = stripH;

    // Source region: right (1 - TABLE_FRAC) of game canvas, top 60%
    var srcX = Math.floor(gameCanvas.width * TABLE_FRAC);
    var srcW = gameCanvas.width - srcX;
    var srcH = Math.floor(gameCanvas.height * 0.60);

    try {
      scoreCtx.clearRect(0, 0, stripW, stripH);
      scoreCtx.drawImage(
        gameCanvas,
        srcX, 0, srcW, srcH,   // scoreboard region from game
        0,    0, stripW, stripH // scaled into the strip
      );
    } catch (e) {
      // drawImage may fail if the WebGL context doesn't preserve buffer.
      // Silently stop the loop; the strip stays dark (not a fatal error).
      scoreRaf = null;
      return;
    }

    scoreRaf = requestAnimationFrame(mirrorLoop);
  }

  mirrorLoop();
}

// ─── Key simulation ───────────────────────────────────────────────────────────
function fireKey(type, keyCode, key, code) {
  var c = document.getElementById('canvas');
  var opts = {
    bubbles: true, cancelable: true,
    key: key, code: code,
    keyCode: keyCode, which: keyCode, charCode: 0
  };
  [c, document, window].forEach(function(t) {
    try { t.dispatchEvent(new KeyboardEvent(type, opts)); } catch(e) {}
  });
}

var LDn = function() { fireKey('keydown', 90,  'z', 'KeyZ');  };
var LUp = function() { fireKey('keyup',   90,  'z', 'KeyZ');  };
var RDn = function() { fireKey('keydown', 191, '/', 'Slash'); };
var RUp = function() { fireKey('keyup',   191, '/', 'Slash'); };

function launchBall() {
  if (ballLaunched) return;
  ballLaunched = true;
  // Hold spacebar to pull plunger, release to fire
  fireKey('keydown', 32, ' ', 'Space');
  setTimeout(function() { fireKey('keyup', 32, ' ', 'Space'); }, 750);
  // On mobile: hide the launch hint and enable paddle controls
  if (IS_MOBILE) {
    if (launchHint) launchHint.classList.remove('show');
    paddleL.classList.add('active');
    paddleR.classList.add('active');
    // Now that scrolling is no longer needed, disable the scroll layer
    // so touch events reach the canvas for paddle control
    sl.style.pointerEvents = 'none';
  }
}

// ─── Scroll layer ─────────────────────────────────────────────────────────────
var sl = document.createElement('div');
sl.id = 'scroll-layer';
Object.assign(sl.style, {
  position: 'fixed', inset: '0',
  overflowY: 'scroll', overflowX: 'hidden',
  zIndex: '10',
  WebkitOverflowScrolling: 'touch'
});
var spacer = document.createElement('div');
spacer.id = 'scroll-spacer';
spacer.style.height = '300vh';
sl.appendChild(spacer);
document.body.appendChild(sl);

function threshold() { return window.innerHeight * 0.42; }

// ─── Scroll-to-bottom launch (mobile) ─────────────────────────────────────────
function handleBottomReached() {
  if (bottomTriggered || !inGameMode) return;
  bottomTriggered = true;

  var maxScroll    = sl.scrollHeight - sl.clientHeight;
  // Bounce back to ~40% of max scroll — keeps us in game mode (above threshold)
  var bounceTarget = Math.floor(maxScroll * 0.40);

  sl.scrollTo({ top: bounceTarget, behavior: 'smooth' });

  // Launch after the bounce settles; cancel if user exits game mode during scroll
  launchTimeout = setTimeout(function() {
    if (!inGameMode) return;
    if (gameReady) launchBall();
    else pendingLaunch = true;
  }, 520);
}

sl.addEventListener('scroll', function() {
  var maxScroll = sl.scrollHeight - sl.clientHeight;

  if (sl.scrollTop > threshold()) {
    if (!inGameMode) enterGame();
  } else {
    if (inGameMode) _exitInternal();
  }

  // Mobile: detect the very bottom of the scroll to trigger launch
  if (IS_MOBILE && inGameMode && !bottomTriggered && sl.scrollTop >= maxScroll - 8) {
    handleBottomReached();
  }
}, { passive: true });

// ─── Game mode enter / exit ───────────────────────────────────────────────────
function enterGame() {
  inGameMode = true;
  overlay.classList.add('hidden');
  backPill.classList.add('show');

  if (IS_MOBILE) {
    // Show score strip
    mobileScore.classList.add('show');
    startScoreMirror();

    if (!ballLaunched) {
      // Ball hasn't launched yet: show hint, keep scroll active so user can reach bottom
      if (launchHint) launchHint.classList.add('show');
      // Do NOT set sl.style.pointerEvents = 'none' yet — user needs to scroll to bottom
    } else {
      // Ball already launched (user scrolled away and back): show paddles
      paddleL.classList.add('active');
      paddleR.classList.add('active');
      sl.style.pointerEvents = 'none';
    }
  } else {
    // Desktop: launch immediately and pass clicks through to canvas
    paddleL.classList.add('active');
    paddleR.classList.add('active');
    sl.style.pointerEvents = 'none';
    if (gameReady) launchBall();
    else pendingLaunch = true;
  }
}

// Called only from scroll listener (user scrolled back above threshold)
function _exitInternal() {
  inGameMode = false;
  bottomTriggered = false;
  if (launchTimeout) { clearTimeout(launchTimeout); launchTimeout = null; }
  overlay.classList.remove('hidden');
  paddleL.classList.remove('active');
  paddleR.classList.remove('active');
  backPill.classList.remove('show');
  sl.style.pointerEvents = 'auto'; // re-enable scrolling
  if (IS_MOBILE) {
    mobileScore.classList.remove('show');
    if (launchHint && !ballLaunched) launchHint.classList.remove('show');
  }
}

// Called from back pill — scroll programmatically to top
function exitGame() {
  _exitInternal();
  sl.scrollTo({ top: 0, behavior: 'smooth' });
}

// ─── Paddle controls ──────────────────────────────────────────────────────────
function bindPaddle(el, dn, up) {
  function press(e)  { e.preventDefault(); dn(); el.classList.add('lit');    }
  function release(e){ e.preventDefault(); up(); el.classList.remove('lit'); }
  el.addEventListener('mousedown',   press,   false);
  el.addEventListener('mouseup',     release, false);
  el.addEventListener('mouseleave',  release, false);
  el.addEventListener('touchstart',  press,   { passive: false });
  el.addEventListener('touchend',    release, { passive: false });
  el.addEventListener('touchcancel', release, false);
}
bindPaddle(paddleL, LDn, LUp);
bindPaddle(paddleR, RDn, RUp);

// Also wire left/right click on the canvas itself
var cv = document.getElementById('canvas');

cv.addEventListener('mousedown', function(e) {
  var mid = cv.getBoundingClientRect().left + cv.getBoundingClientRect().width / 2;
  (e.clientX < mid) ? LDn() : RDn();
});
cv.addEventListener('mouseup',   function() { LUp(); RUp(); });
cv.addEventListener('touchstart', function(e) {
  e.preventDefault();
  var rect = cv.getBoundingClientRect();
  var leftZone  = rect.left + rect.width * 0.30;
  var rightZone = rect.left + rect.width * 0.70;
  for (var i = 0; i < e.changedTouches.length; i++) {
    var x = e.changedTouches[i].clientX;
    if (x < leftZone) {
      LDn();
    } else if (x > rightZone) {
      RDn();
    } else {
      // Center zone: pull and release plunger — launches any ball (1st, 2nd, …)
      fireKey('keydown', 32, ' ', 'Space');
      setTimeout(function() { fireKey('keyup', 32, ' ', 'Space'); }, 750);
    }
  }
}, { passive: false });
cv.addEventListener('touchend', function(e) {
  e.preventDefault(); LUp(); RUp();
}, { passive: false });
</script>
